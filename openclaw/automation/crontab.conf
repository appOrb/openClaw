# OpenClaw Multi-Agent Automation Crontab
# Install with: ./install-crontab.sh

# Daily Standup - 9:00 AM UTC
0 9 * * * /home/azureuser/projects/appOrb/openClaw/openclaw/automation/daily-standup.sh >> /home/azureuser/projects/appOrb/openClaw/logs/standup.log 2>&1

# Daily Metrics Report - 5:00 PM UTC (17:00)
0 17 * * * /home/azureuser/projects/appOrb/openClaw/openclaw/automation/metrics-report.sh >> /home/azureuser/projects/appOrb/openClaw/logs/metrics.log 2>&1

# Weekly Summary - Sunday 8:00 PM UTC (20:00)
# (Handled by metrics-report.sh on Sundays)

# Health check - Every hour
0 * * * * /home/azureuser/projects/appOrb/openClaw/openclaw/automation/health-check.sh >> /home/azureuser/projects/appOrb/openClaw/logs/health.log 2>&1
