name: Deploy OpenClaw Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_VERSION: "1.5.7"
  WORKING_DIR: "infra/terraform"

jobs:
  terraform:
    name: "Terraform / ${{ github.event.inputs.action || 'plan' }}"
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    env:
      # Azure service principal — set these in repo Settings → Secrets → Actions
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      # OpenClaw GitHub PAT (repo + workflow scopes) — used by Alex to push code + open PRs
      TF_VAR_github_token: ${{ secrets.OPENCLAW_GITHUB_TOKEN }}

      # Classic GitHub PAT with 'copilot' scope — used by OpenClaw to call GitHub Copilot API.
      # Create at: https://github.com/settings/tokens/new?scopes=copilot (Classic token, not fine-grained)
      TF_VAR_copilot_pat: ${{ secrets.COPILOT_PAT }}

      # Classic GitHub PAT for gh CLI on VM (repo + workflow + read:org) — used by agents to push PRs.
      # Create at: https://github.com/settings/tokens/new?scopes=repo,workflow,read:org
      TF_VAR_github_agent_pat: ${{ secrets.GITHUB_AGENT_PAT }}

      # In CI runners have dynamic IPs so SSH must be open to all.
      # The NSG still blocks non-SSH ports. For tighter security set this to a
      # static IP or VPN CIDR via the SSH_SOURCE_CIDR secret.
      TF_VAR_ssh_source_cidr: ${{ secrets.SSH_SOURCE_CIDR || '*' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Write SSH keys from secrets so Terraform remote-exec can reach the VM.
      # Keys are scoped to this job's runner and deleted when the runner cleans up.
      - name: Write SSH keys
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          printf '%s\n' "${{ secrets.SSH_PUBLIC_KEY }}"  > ~/.ssh/id_rsa.pub
          chmod 600 ~/.ssh/id_rsa
          chmod 644 ~/.ssh/id_rsa.pub
          # Disable strict host checking so first-connect to a new VM doesn't block
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=openclaw.tfplan

      - name: Upload plan artifact
        if: github.event.inputs.action != 'destroy'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.sha }}
          path: ${{ env.WORKING_DIR }}/openclaw.tfplan
          retention-days: 5

      # Apply only on: push to main  OR  manual workflow_dispatch with action=apply
      - name: Terraform Apply
        if: |
          github.ref == 'refs/heads/main' && (
            github.event_name == 'push' ||
            (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
          )
        run: terraform apply -auto-approve "openclaw.tfplan"

      # Destroy only on explicit manual trigger
      - name: Terraform Destroy
        if: >
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve

      - name: Output connection info
        if: success() && github.event.inputs.action != 'destroy'
        run: terraform output 2>/dev/null || true
