app:
  title: OpenClaw Platform
  baseUrl: http://localhost:3000

organization:
  name: AppOrb

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
    # Uncomment the following host directive to bind to specific interfaces
    # host: 0.0.0.0
  csp:
    connect-src: ["'self'", 'http:', 'https:']
    # Content-Security-Policy directives follow the Helmet format: https://helmetjs.github.io/#reference
    # Default Helmet Content-Security-Policy values can be removed by setting the key to false
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  # This is for local development only, it is not recommended to use this in production
  # The production database configuration is done in app-config.production.yaml
  database:
    client: better-sqlite3
    connection: ':memory:'
  
  # workingDirectory: /tmp # Use this to configure a working directory for the scaffolder, defaults to the OS temp-dir

integrations:
  github:
    - host: github.com
      # This is a Personal Access Token or PAT from GitHub. You can find out how to generate this token, and more information
      # about setting up the GitHub integration here: https://backstage.io/docs/integrations/github/locations#configuration
      token: ${GITHUB_TOKEN}
  
  azure:
    - host: portal.azure.com
      credentials:
        - clientId: ${AZURE_CLIENT_ID}
          clientSecret: ${AZURE_CLIENT_SECRET}
          tenantId: ${AZURE_TENANT_ID}

proxy:
  endpoints:
    '/azure-api':
      target: 'https://management.azure.com'
      headers:
        Authorization: 'Bearer ${AZURE_TOKEN}'

# Reference documentation http://backstage.io/docs/features/techdocs/configuration
# Note: After experimenting with basic setup, use CI/CD to generate docs
# and an external cloud storage when deploying TechDocs for production use-case.
# https://backstage.io/docs/features/techdocs/how-to-guides#how-to-migrate-from-techdocs-basic-to-recommended-deployment-approach
techdocs:
  builder: 'local' # Alternatives - 'external'
  generator:
    runIn: 'local' # Alternatives - 'docker'
  publisher:
    type: 'local' # Alternatives - 'googleGcs' or 'awsS3'. Read documentation for using alternatives.

auth:
  # see https://backstage.io/docs/auth/ to learn about auth providers
  environment: development
  providers:
    github:
      development:
        clientId: ${AUTH_GITHUB_CLIENT_ID}
        clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}
    
    microsoft:
      development:
        clientId: ${AZURE_CLIENT_ID}
        clientSecret: ${AZURE_CLIENT_SECRET}
        tenantId: ${AZURE_TENANT_ID}

scaffolder:
  # see https://backstage.io/docs/features/software-templates/configuration for software template options
  defaultAuthor:
    name: OpenClaw Bot
    email: bot@openclaw.ai
  defaultCommitMessage: 'Initial commit from OpenClaw Platform'

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Location, Template, Group, User]
  locations:
    # OpenClaw components
    - type: url
      target: https://github.com/appOrb/openClaw/blob/main/backstage/catalog/components/openclaw-platform.yaml
    
    # OpenClaw templates
    - type: url
      target: https://github.com/appOrb/openClaw/blob/main/backstage/templates/openclaw-deployment/template.yaml
    
    # GitHub organization discovery (optional)
    # - type: github-org
    #   target: https://github.com/appOrb

kubernetes:
  serviceLocatorMethod:
    type: 'multiTenant'
  clusterLocatorMethods:
    - type: 'config'
      clusters:
        - url: ${K8S_CLUSTER_URL}
          name: openclaw-aks
          authProvider: 'serviceAccount'
          skipTLSVerify: false
          serviceAccountToken: ${K8S_SA_TOKEN}

# ArgoCD integration
argocd:
  username: ${ARGOCD_USERNAME}
  password: ${ARGOCD_PASSWORD}
  appLocatorMethods:
    - type: 'config'
      instances:
        - name: argocd
          url: ${ARGOCD_URL}
          username: ${ARGOCD_USERNAME}
          password: ${ARGOCD_PASSWORD}

# Azure DevOps (optional)
azureDevOps:
  host: dev.azure.com
  token: ${AZURE_DEVOPS_TOKEN}
  organization: appOrb

# Cost Insights
costInsights:
  engineerCost: 200000
  products:
    computeEngine:
      name: Compute Engine
      icon: compute
    cloudDataflow:
      name: Cloud Dataflow
      icon: data
    cloudStorage:
      name: Cloud Storage
      icon: storage
    bigQuery:
      name: BigQuery
      icon: search

# OpenClaw custom configuration
openclaw:
  deployments:
    - name: openclaw-dev
      platform: vm
      region: eastus
      url: ${OPENCLAW_DEV_URL}
    - name: openclaw-staging
      platform: aci
      region: eastus
      url: ${OPENCLAW_STAGING_URL}
    - name: openclaw-production
      platform: aks
      region: eastus
      url: ${OPENCLAW_PROD_URL}
  
  agents:
    count: 9
    roles:
      - ceo
      - cmo
      - cto
      - engineer
      - devops
      - platform
      - infrastructure
      - security
      - researcher
