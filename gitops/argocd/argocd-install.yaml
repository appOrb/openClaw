apiVersion: v1
kind: Namespace
metadata:
  name: argocd
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-server
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-server
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
  - nonResourceURLs: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-server
subjects:
  - kind: ServiceAccount
    name: argocd-server
    namespace: argocd
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  repositories: |
    - url: https://github.com/appOrb/openClaw.git
      name: openclaw
      type: git
      sshPrivateKeySecret:
        name: argocd-repo-creds
        key: sshPrivateKey
  
  accounts.admin: apiKey, login
  accounts.backstage: apiKey
  
  # GitHub SSO
  url: https://argocd.openclaw.ai
  dex.config: |
    connectors:
    - type: github
      id: github
      name: GitHub
      config:
        clientID: $GITHUB_CLIENT_ID
        clientSecret: $GITHUB_CLIENT_SECRET
        orgs:
        - name: appOrb
  
  # Notifications
  notifications: |
    service.webhook.discord: |
      url: $DISCORD_WEBHOOK_URL
    
    subscriptions: |
      - recipients:
        - discord
        triggers:
        - on-deployed
        - on-health-degraded
        - on-sync-failed
  
  # Status badges
  statusbadge.enabled: "true"
  
  # Resource tracking
  application.resourceTrackingMethod: annotation
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
data:
  policy.default: role:readonly
  policy.csv: |
    # Admin role
    g, appOrb:admins, role:admin
    
    # Backstage role (automation)
    p, role:backstage, applications, *, */*, allow
    p, role:backstage, clusters, get, *, allow
    p, role:backstage, repositories, get, *, allow
    p, role:backstage, projects, get, *, allow
    g, backstage, role:backstage
    
    # Developer role
    p, role:developer, applications, get, */*, allow
    p, role:developer, applications, sync, */*, allow
    g, appOrb:developers, role:developer
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-server
  namespace: argocd
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: https
      port: 443
      targetPort: 8080
    - name: grpc
      port: 443
      targetPort: 8080
  selector:
    app.kubernetes.io/name: argocd-server
