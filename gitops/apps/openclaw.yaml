apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: openclaw
  
  source:
    repoURL: https://github.com/appOrb/openClaw.git
    targetRevision: HEAD
    path: k8s/overlays/dev
    kustomize:
      images:
        - openclaw:dev
  
  destination:
    server: https://kubernetes.default.svc
    namespace: openclaw-dev
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ApplyOutOfSyncOnly=false
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  revisionHistoryLimit: 10
  
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: openclaw
  
  source:
    repoURL: https://github.com/appOrb/openClaw.git
    targetRevision: main
    path: k8s/overlays/staging
    kustomize:
      images:
        - openclaw:staging
  
  destination:
    server: https://kubernetes.default.svc
    namespace: openclaw-staging
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw-production
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: openclaw
  
  source:
    repoURL: https://github.com/appOrb/openClaw.git
    targetRevision: production
    path: k8s/overlays/production
    kustomize:
      images:
        - openclaw:v1.0.0
  
  destination:
    server: https://kubernetes.default.svc
    namespace: openclaw-production
  
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  
  # Production requires manual approval
  syncPolicy:
    automated: null
