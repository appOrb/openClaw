## Nginx reverse proxy for OpenClaw + Paperclip
## File: /etc/nginx/sites-available/openclaw
##
## Initial deploy: HTTP only (SSL added later via certbot)
## To add SSL after DNS is set:
##   sudo certbot --nginx -d openclaw-reevelobo.eastus.cloudapp.azure.com
##
## NOTE: The /gateway/ location is required — Paperclip's openclaw_gateway
## adapter requires https:// URLs. This block proxies the OpenClaw gateway
## (port 18791) over HTTPS so Paperclip can connect to it.

server {
    server_name openclaw-reevelobo.eastus.cloudapp.azure.com 13.92.42.136;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN"          always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy "strict-origin"        always;
    add_header X-XSS-Protection "1; mode=block"       always;

    # ── OpenClaw Gateway (Paperclip adapter) ──────────────────────────────
    # Paperclip agents use adapterConfig.url = https://<host>/gateway
    location /gateway/ {
        proxy_pass         http://127.0.0.1:18791/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_buffering    off;
    }

    # ── Paperclip UI + API ─────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/openclaw-reevelobo.eastus.cloudapp.azure.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openclaw-reevelobo.eastus.cloudapp.azure.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = openclaw-reevelobo.eastus.cloudapp.azure.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name openclaw-reevelobo.eastus.cloudapp.azure.com 13.92.42.136;
    return 404;
}
