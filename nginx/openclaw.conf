## Nginx reverse proxy for OpenClaw + Paperclip
## File: /etc/nginx/sites-available/openclaw
##
## Authentication flow:
##   Browser → Nginx (443) → oauth2-proxy (4180) → Paperclip (3100)
##   oauth2-proxy authenticates users via Keycloak (OIDC, port 8080 internal).
##
## Port 18789 = OpenClaw agent WebSocket gateway (accepts WS upgrade)
## The /gateway/ path is intentionally open — Paperclip agents connect there.
##
## SSL managed by Certbot (Let's Encrypt).
## After SSL is enabled, cookie-secure is set to true automatically by
## keycloak-setup.sh (detected via /etc/letsencrypt/live/<fqdn>).

server {
    server_name openclaw-reevelobo.eastus.cloudapp.azure.com 13.92.42.136;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN"          always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy "strict-origin"        always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── OpenClaw Gateway (Paperclip adapter) ──────────────────────────────
    # Paperclip agents use adapterConfig.url = wss://<host>/gateway/
    # This location is intentionally unauthenticated — agents connect here.
    location /gateway/ {
        proxy_pass         http://127.0.0.1:18789/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_buffering    off;
    }

    # ── Paperclip UI + API (authenticated via oauth2-proxy → Keycloak) ────
    # All traffic (including /oauth2/* OIDC callbacks) is handled by oauth2-proxy.
    # Unauthenticated requests are redirected to Keycloak login.
    location / {
        proxy_pass         http://127.0.0.1:4180;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/openclaw-reevelobo.eastus.cloudapp.azure.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openclaw-reevelobo.eastus.cloudapp.azure.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = openclaw-reevelobo.eastus.cloudapp.azure.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name openclaw-reevelobo.eastus.cloudapp.azure.com 13.92.42.136;
    return 404;
}
