## Nginx reverse proxy for OpenClaw + Paperclip
## File: /etc/nginx/sites-available/openclaw
##
## Setup:
##   sudo ln -sf /etc/nginx/sites-available/openclaw /etc/nginx/sites-enabled/
##   sudo nginx -t && sudo systemctl reload nginx
##   sudo certbot --nginx -d your-domain.com    # get SSL cert (run AFTER DNS points to VM)

server {
    listen 80;
    server_name your-domain.com;           # ← replace with your domain (or VM IP for testing)

    # Redirect all HTTP to HTTPS (certbot fills this in automatically)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name your-domain.com;           # ← replace with your domain

    # SSL managed by certbot
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN"          always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy "strict-origin"        always;
    add_header X-XSS-Protection "1; mode=block"       always;

    # ── Paperclip UI + API ─────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    # ── OpenClaw heartbeat / status endpoint ──────────────────────────────
    location /openclaw/ {
        proxy_pass         http://127.0.0.1:4000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;
}
