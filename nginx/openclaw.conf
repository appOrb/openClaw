## Nginx reverse proxy for OpenClaw + Paperclip
## File: /etc/nginx/sites-available/openclaw
##
## Port 18789 = OpenClaw agent WebSocket gateway (accepts WS upgrade)
## Port 18791 = OpenClaw browser control plane (HTTP only, returns 200 JSON)
##
## Auth: Paperclip UI is protected by HTTP Basic Auth.
##       htpasswd file lives at /etc/nginx/.htpasswd on the VM.
##       The /gateway/ path is intentionally open — Paperclip agents connect there.
##       To update the password: sudo htpasswd /etc/nginx/.htpasswd admin

server {
    server_name openclaw-reevelobo.eastus.cloudapp.azure.com 13.92.42.136;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN"          always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy "strict-origin"        always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── OpenClaw Gateway (Paperclip adapter) ──────────────────────────────
    # Paperclip agents use adapterConfig.url = wss://<host>/gateway/
    # Port 18789 is the agent WebSocket gateway (accepts WS upgrade)
    # Port 18791 is the browser/CDP control plane (HTTP only, returns 200 JSON)
    location /gateway/ {
        proxy_pass         http://127.0.0.1:18789/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_buffering    off;
    }

    # ── Paperclip UI + API (password protected) ───────────────────────────
    # HTTP Basic Auth — required for all dashboard/API access.
    # Create/update credentials on VM: sudo htpasswd /etc/nginx/.htpasswd admin
    location / {
        auth_basic           "OpenClaw Control Plane";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass         http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/openclaw-reevelobo.eastus.cloudapp.azure.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openclaw-reevelobo.eastus.cloudapp.azure.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = openclaw-reevelobo.eastus.cloudapp.azure.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name openclaw-reevelobo.eastus.cloudapp.azure.com 13.92.42.136;
    return 404;
}
