## Nginx reverse proxy for OpenClaw + Paperclip
## File: /etc/nginx/sites-available/openclaw
##
## Initial deploy: HTTP only (SSL added later via certbot)
## To add SSL after DNS is set:
##   sudo certbot --nginx -d openclaw-reevelobo.eastus.cloudapp.azure.com

server {
    listen 80;
    server_name openclaw-reevelobo.eastus.cloudapp.azure.com 13.92.42.136;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN"          always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy "strict-origin"        always;
    add_header X-XSS-Protection "1; mode=block"       always;

    # ── Paperclip UI + API ─────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    # ── OpenClaw heartbeat / status endpoint ──────────────────────────────
    location /openclaw/ {
        proxy_pass         http://127.0.0.1:4000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;
}
