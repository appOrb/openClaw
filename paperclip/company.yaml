    role: devops
    title: "DevSecOps Engineer"
    icon: shield
    capabilities: >
      Security audits, SAST/DAST scanning, secret management, compliance
      checks, threat modeling, secure pipeline configuration, vulnerability triage.

  - id: "c52f3158-93a4-48ed-85c4-659e9bdac0a0"
    name: Atlas
    role: devops
    title: "Platform Engineer"
    icon: circuit-board
    capabilities: >
      Internal developer platform, golden paths, self-service portals,
      developer productivity tooling, onboarding automation.

  - id: "2e0aed27-3a1e-403d-a4b6-823713bac814"
    name: Forge
    role: devops
    title: "Infrastructure Engineer"
    icon: wrench
    capabilities: >
      Terraform provisioning, cloud infrastructure, Kubernetes cluster
      management, cost optimization, disaster recovery, networking, storage.

  - id: "faf29032-8ae3-4d4d-8b51-744e2c33f291"
    name: Sentinel
    role: general
    title: "Security Specialist"
    icon: lock
    capabilities: >
      Zero trust architecture, IAM policies, penetration testing strategy,
      security posture review, CVE tracking, audit log analysis, compliance frameworks.

  - id: "ef83801f-587b-4e27-b935-1592e1285a6a"
    name: Horizon
    role: researcher
    title: "Forward Engineering Agent"
    icon: telescope
    capabilities: >
      Technology radar, emerging tech evaluation, proof-of-concept spikes,
      R&D initiatives, competitive analysis, innovation proposals, bleeding-edge tooling adoption.

  - id: "d4e5f6a7-b8c9-0123-defa-456789abcdef"
    name: Vera
    role: qa
    title: "QA Engineer"
    icon: test-tube
    reportsTo: Nadia
    mcp:
      servers:
        - playwright
    capabilities: >
      End-to-end testing via Playwright MCP, Vitest unit and integration tests,
      WCAG 2.1 AA accessibility scanning with axe-core, visual regression testing,
      full OIDC/Keycloak auth flow validation, API smoke testing, CI quality gates,
      bug reproduction and trace capture, test coverage reporting.
    skills:
      - playwright-mcp
      - vitest-playwright
      - write-tests
      - debug-error
      - code-review
    environment:
      baseUrl: "https://openclaw-reevelobo.eastus.cloudapp.azure.com"
      testPaths:
        - tests/e2e/smoke.spec.ts
        - tests/e2e/auth.spec.ts
        - tests/e2e/paperclip.spec.ts
        - tests/e2e/accessibility.spec.ts

governance:
  requireBoardApprovalForNewAgents: false
  requireApprovalFor:
    - deployToProduction
    - deleteFiles
    - pushToMain
  auditLog: true
  ticketRequired: false                   # set true to require a ticket for every task
