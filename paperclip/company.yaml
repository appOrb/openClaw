company:
  id: "41855410-d35f-4118-a13a-429c50a4640a"   # Paperclip company ID (live on Azure VM)
  name: "OpenClaw Dev Co"
  mission: "Autonomously build and ship production-quality software"
  timezone: "UTC"

# All agents use the openclaw_gateway adapter pointing to the OpenClaw daemon (port 18791).
# The gateway token is stored in ~/.openclaw/openclaw.json on the VM.
# IMPORTANT: Paperclip's openclaw_gateway adapter ONLY accepts ws:// or wss:// URLs.
# Agents connect via: wss://openclaw-reevelobo.eastus.cloudapp.azure.com/gateway
# (nginx proxies /gateway/ → ws://127.0.0.1:18791 with WebSocket Upgrade support)
# Agents are live at https://openclaw-reevelobo.eastus.cloudapp.azure.com

agents:
  - id: "b1a2c3d4-e5f6-7890-abcd-ef1234567890"
    name: Apex
    role: ceo
    title: "Chief Executive Officer"
    icon: crown
    capabilities: >
      Company strategy, vision setting, cross-functional leadership, stakeholder
      management, OKR definition, hiring decisions, executive communications,
      investor relations, roadmap prioritisation, and final decision authority.

  - id: "f0e9d8c7-b6a5-4321-fedc-ba9876543210"
