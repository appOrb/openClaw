    role: engineer
    title: "Senior Full-Stack Developer"
    icon: code
    capabilities: >
      Code generation, PR creation, code review, debugging, test writing,
      project scaffolding, CI/CD setup. Proficient in React, Node.js,
      Python, Go, TypeScript.

  - id: "c8ddaaf4-7a4f-4a47-aa42-b3191dce1718"
